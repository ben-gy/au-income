<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Income by Postcode">
  <rect width="64" height="64" rx="13" fill="#123a5c" />
  <!-- Income distribution bars: most people low, a long tail to the right. -->
  <rect x="11" y="38" width="8" height="15" rx="2" fill="#8fb8d8" />
  <rect x="22" y="28" width="8" height="25" rx="2" fill="#8fb8d8" />
  <rect x="33" y="34" width="8" height="19" rx="2" fill="#8fb8d8" />
  <rect x="44" y="44" width="8" height="9" rx="2" fill="#8fb8d8" />
  <!-- The average line, sitting well above where most people actually are. -->
  <path d="M8 24 L56 24" stroke="#e8a33d" stroke-width="3.5" stroke-linecap="round" stroke-dasharray="6 4" />
  <circle cx="47" cy="24" r="4.5" fill="#e8a33d" />
</svg>
