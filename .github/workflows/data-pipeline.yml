name: Data Pipeline

on:
  schedule:
    # Source cadence: ANNUAL. The ATO publishes Taxation Statistics once a year
    # (the 2023-24 edition landed mid-2026), so the cron is yearly to match —
    # checking more often would just re-download an identical workbook.
    # Staggered to 09 June at 06:23 UTC so it doesn't collide with other repos.
    - cron: '23 6 9 6 *'
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['pipeline/**']

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd pipeline && npm ci
      - run: node pipeline/collect.mjs
      - run: node pipeline/aggregate.mjs
      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "Update data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || (git pull --rebase && git push)
